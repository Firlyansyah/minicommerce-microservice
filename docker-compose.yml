version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: minicommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootroot
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  catalog-service:
    build: ./minicommerce-catalog
    container_name: catalog-service
    depends_on:
      - mysql
    ports:
      - '8081:8081'
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/minicommerce_catalog
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootroot

  order-service:
    build: ./minicommerce-order
    container_name: order-service
    depends_on:
      - mysql
    ports:
      - '8082:8082'
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/minicommerce_order
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootroot

  api-gateway:
    build: ./minicommerce-api-gateway
    container_name: api-gateway
    depends_on:
      - catalog-service
      - order-service
    ports:
      - '8080:8080'

volumes:
  mysql-data:
